<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art Reflection | Workshop</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<header>

<div class="logo">

Art Reflection

</div>

<div>

制作中...

</div>

</header>


<div class="workspace">

<!-- ===========================
LEFT
=========================== -->

<div class="chatPanel">

<div class="progressCard">

<div class="progressTitle">

創作の進み具合

<span id="progressValue">0%</span>

</div>

<div class="progressBar">
    <div class="progressFill"></div>
</div>

<div class="phaseLabel" id="phaseLabel">ステップ 1 ／ 感情を見つける</div>

</div>



<div class="chatArea" id="chatArea">

</div>


<div class="inputArea">

<input
type="text"
id="userInput"
placeholder="あなたの想いを入力してください..."
>

<button id="sendButton">

送信

</button>

</div>

</div>





<!-- ===========================
RIGHT
=========================== -->

<div class="previewPanel">

<!-- スタイル選択パネル（finishWorkshop時にJSで表示） -->
<div id="styleSelectPanel" style="display:none;" class="styleSelectPanel">

    <h3 class="styleSelectPanel__title">どんな表現にしますか？</h3>
    <p class="styleSelectPanel__desc">作品のスタイルを選んでください。</p>

    <div class="styleGrid" id="styleGrid">
        <button class="styleChip" data-style="完全抽象">🎨 完全抽象</button>
        <button class="styleChip" data-style="水彩画">💧 水彩画</button>
        <button class="styleChip" data-style="水墨画">🖌 水墨画</button>
        <button class="styleChip" data-style="油絵風">🖼 油絵風</button>
        <button class="styleChip" data-style="コラージュ">✂️ コラージュ</button>
        <button class="styleChip" data-style="線画">✏️ 線画</button>
        <button class="styleChip" data-style="幾何学">🔷 幾何学</button>
        <button class="styleChip styleChip--default" data-style="AIに任せる">✨ AIに任せる</button>
    </div>

    <button id="generateBtn" class="mainButton" style="margin-top:20px; width:100%; opacity:0.5;" disabled>
        作品を生成する →
    </button>

</div>

<div class="previewCard">

<h2>

作品プレビュー

</h2>

<div class="previewArtwork">

<div class="artPlaceholder">

作品がここに生成されます

</div>

</div>

</div>



<div class="emotionCard">

<h2>

感情マップ

</h2>

<div class="emotion">

<span>🌱 安心</span>

<div class="bar">

<div class="fill fill1"></div>

</div>

</div>

<div class="emotion">

<span>🌊 静けさ</span>

<div class="bar">

<div class="fill fill2"></div>

</div>

</div>

<div class="emotion">

<span>🔥 情熱</span>

<div class="bar">

<div class="fill fill3"></div>

</div>

</div>

<div class="emotion">

<span>🌙 懐かしさ</span>

<div class="bar">

<div class="fill fill4"></div>

</div>

</div>

</div>

</div>

</div>

<script src="workshop.js"></script>

</body>
</html>
