<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art Reflection | Workshop</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<header>

<div class="logo">

Art Reflection

</div>

<div>

制作中...

</div>

</header>


<div class="workspace">

<!-- ===========================
LEFT
=========================== -->

<div class="chatPanel">

<div class="progressCard">

<div class="progressTitle">

創作の進み具合

<span id="progressValue">

20%

</span>

</div>

<div class="progressBar">

<div class="progressFill"></div>

</div>

</div>



<div class="chatArea" id="chatArea">

<div class="message ai">

<div class="avatar">

🤖

</div>

<div class="bubble">

こんにちは。

今日はあなた自身を映す作品を一緒に作ります。

まず最初に、

<strong>このテーマを選んだ理由</strong>

を教えてください。

</div>

</div>

</div>


<div class="inputArea">

<input
type="text"
id="userInput"
placeholder="あなたの想いを入力してください..."
>

<button id="sendButton">

送信

</button>

</div>

</div>





<!-- ===========================
RIGHT
=========================== -->

<div class="previewPanel">

<div class="previewCard">

<h2>

作品プレビュー

</h2>

<div class="previewArtwork">

<div class="artPlaceholder">

作品がここに生成されます

</div>

</div>

</div>



<div class="emotionCard">

<h2>

感情マップ

</h2>

<div class="emotion">

<span>🌱 安心</span>

<div class="bar">

<div class="fill fill1"></div>

</div>

</div>

<div class="emotion">

<span>🌊 静けさ</span>

<div class="bar">

<div class="fill fill2"></div>

</div>

</div>

<div class="emotion">

<span>🔥 情熱</span>

<div class="bar">

<div class="fill fill3"></div>

</div>

</div>

<div class="emotion">

<span>🌙 懐かしさ</span>

<div class="bar">

<div class="fill fill4"></div>

</div>

</div>

</div>

</div>

</div>

<script src="workshop.js"></script>

</body>
</html>
